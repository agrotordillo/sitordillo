{% load static %}

<!DOCTYPE html>
<html lang="es-mx">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="| El Tordillo - Sistema de gestión de inventario" />
  <meta name="keywords" content="El Tordillo, Gestión, Sistema, Inventarios" />
  <title>{% block title %}El Tordillo{% endblock title %}</title>
  <link rel="stylesheet" href="{% static 'src/output.css' %}" />
</head>

<body>
  {% include "core/includes/layouts/_navbar.html" %}
  {% block content %}
  <div class="fixed inset-0 flex items-center justify-center pointer-events-none select-none opacity-25">
    <img height="" width="" src="{% static 'src/logo.png' %}" alt="Logo El Tordillo"
      class="w-[320px] sm:w-[390px] mt-28 grayscale opacity-25" />
  </div>
  {% endblock content %}
  <script type="module" src="{% static 'js/app.js' %}"></script>
  <script src="{% static 'src/flowbite.min.js' %}"></script>
  {% block extra_js %}
  {% endblock extra_js %}
</body>

</html>
