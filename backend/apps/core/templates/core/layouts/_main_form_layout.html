{% extends "_base.html" %}
{% block content %}
<div class="{% block primary_container_class %}container-primary{% endblock primary_container_class %}">
    <div class="container-secondary">
        <div class="header-container">
            <div>
                <h2 class="module-title">{% block title_layout %}Formulario{% endblock title_layout %}</h2>
                {% block breadcrumbs %}{% endblock breadcrumbs %}
            </div>
        </div>
        <div class="body-container px-4 py-5 sm:p-6">
            {% include "core/includes/_form_alerts.html" %}
            {% block main_content %}{% endblock main_content %}
        </div>
    </div>
</div>
{% endblock content %}
