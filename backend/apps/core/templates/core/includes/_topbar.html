{% load static %}
<header class="topbar">
  <div class="topbar-brand">
    <button type="button" class="btn-icon" id="sidebar-toggle" aria-label="Abrir menú">
      <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
    <a href="{% url 'home' %}" class="flex items-center gap-2">
      <img src="{% static 'src/logo.png' %}" class="h-8 w-8 object-contain" alt="El Tordillo" width="32" height="32" />
      <span class="text-base sm:text-lg font-bold text-gray-800 truncate">El Tordillo</span>
    </a>
    <span class="badge-muted hidden sm:inline-flex">SIT</span>
  </div>

  <div class="topbar-actions">
    <button type="button" class="btn-icon relative" aria-label="Notificaciones">
      <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
    </button>
    <div class="flex items-center gap-2 pl-2 ml-1 border-l border-gray-200">
      <div class="w-8 h-8 rounded-xl bg-primary-100 flex items-center justify-center shrink-0">
        <span class="text-xs font-bold text-primary-700">U</span>
      </div>
      <div class="hidden md:block">
        <p class="text-sm font-semibold text-gray-700 leading-tight">Usuario</p>
        <p class="text-xs text-gray-400 leading-tight">Mostrador</p>
      </div>
    </div>
  </div>
</header>
